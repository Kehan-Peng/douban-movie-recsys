{% extends "base.html" %}
{% block title %}登录 - 智能电影推荐系统{% endblock %}
{% block content %}
<div class="form-card">
    <h2>用户登录</h2>
    <form action="{{ url_for('login', next=request.args.get('next')) }}" method="post" class="form-grid">
        <label>
            邮箱
            <input type="email" name="email" placeholder="请输入邮箱" required>
        </label>
        <label>
            密码
            <input type="password" name="password" placeholder="请输入密码" required>
        </label>
        <button type="submit" class="btn">登录</button>
    </form>
    <p class="helper-text">测试账号：alice@example.com / 123456</p>
</div>
{% endblock %}
